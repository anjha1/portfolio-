<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://www.achhuta.info/Shortnotes/Visualizer/" />
    <link rel="icon" type="image/png" href="../../a1.jpg">
    <title>Visualizer - Short Notes</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #95b1b245;
            color: #333;
        }
        header {
            background-color: #000;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        header h1 { margin: 0; font-size: 2.5rem; }
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
        nav ul li a:hover { text-decoration: underline; }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        .note-card {
            background-color: #fff;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .note-card h3 { margin: 0 0 10px 0; font-size: 1.5rem; color: #000; }
        .note-card p { margin: 0; color: #666; line-height: 1.6; }
        .note-card .icon { font-size: 2rem; margin-bottom: 15px; color: #007bff; }
        footer {
            text-align: center;
            padding: 15px;
            background-color: #000;
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Visualizer</h1>
        <nav>
            <ul>
                <li><a href="../">Home</a></li>
                <li><a href="../Java/">Java</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h2 class="section-title">Interactive Visualizers</h2>
        <div class="notes-grid">
            <a href="Tree Visualizer/" class="note-card">
                <div class="icon">🌳</div>
                <h3>Tree Visualizer</h3>
                <p>Visualize tree data structures and traversals interactively.</p>
            </a>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Achhuta Nand Jha.</p>
    </footer>
</body>
</html>
