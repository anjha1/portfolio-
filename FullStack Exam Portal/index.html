<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FullStack Exam Portal — Node.js & Express</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0f14;
  --surface: #141720;
  --surface2: #1c2130;
  --border: #2a3045;
  --accent: #5b9bd5;
  --accent2: #7ec8a4;
  --accent3: #f0a04b;
  --danger: #e05c5c;
  --text: #e8eaf2;
  --text-muted: #7a849e;
  --code-bg: #0a0c10;
  --tab-active: #5b9bd5;
  --correct: #2ecc71;
  --wrong: #e74c3c;
  --js-color: #f7df1e;
  --html-color: #e34c26;
  --json-color: #5b9bd5;
}
.light {
  --bg: #f0f2f8;
  --surface: #ffffff;
  --surface2: #e8ebf4;
  --border: #c8d0e4;
  --accent: #3a78c9;
  --accent2: #27ae60;
  --accent3: #e67e22;
  --danger: #c0392b;
  --text: #1a1e2e;
  --text-muted: #5a6480;
  --code-bg: #1a1e2e;
  --tab-active: #3a78c9;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
code,pre,kbd,.mono{font-family:'JetBrains Mono',monospace;}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-.5px;}
.logo span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:12px;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s;}
.theme-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.progress-badge{background:var(--surface2);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:.85rem;color:var(--text-muted);}
.progress-badge span{color:var(--accent2);font-weight:700;}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 61px);}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 61px);position:sticky;top:61px;}
.sidebar-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:12px;}
.q-list{display:flex;flex-direction:column;gap:4px;}
.q-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .2s;font-size:.88rem;}
.q-item:hover{background:var(--surface2);border-color:var(--border);}
.q-item.active{background:color-mix(in srgb,var(--accent) 15%,transparent);border-color:var(--accent);}
.q-item.solved{border-left:3px solid var(--correct);}
.q-num{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
.q-item.active .q-num{background:var(--accent);color:#fff;}
.q-item.solved .q-num{background:var(--correct);color:#fff;}
.q-label{line-height:1.3;color:var(--text-muted);}
.q-item.active .q-label{color:var(--text);}

/* ── MAIN ── */
.main{padding:24px;overflow-y:auto;}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.q-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;}
.q-title{font-size:1.3rem;font-weight:800;}
.marks-badge{background:var(--accent3);color:#1a1000;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;white-space:nowrap;}
.type-badge{display:inline-block;background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);border:1px solid var(--accent);padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;margin-bottom:12px;}
.q-desc{color:var(--text-muted);line-height:1.7;font-size:.95rem;}
.q-desc strong{color:var(--text);}

/* ── CODE TABS ── */
.code-section{margin-top:20px;}
.section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px;}
.code-tabs{display:flex;gap:6px;margin-bottom:0;border-bottom:1px solid var(--border);}
.code-tab{padding:8px 16px;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:.82rem;font-weight:600;background:var(--surface2);color:var(--text-muted);transition:all .2s;display:flex;align-items:center;gap:6px;}
.code-tab:hover{color:var(--text);}
.code-tab.active{background:var(--code-bg);color:var(--text);border-color:var(--border);}
.code-tab .dot{width:8px;height:8px;border-radius:50%;}
.dot-js{background:var(--js-color);}
.dot-html{background:var(--html-color);}
.dot-json{background:var(--json-color);}
.code-pane{display:none;background:var(--code-bg);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;position:relative;}
.code-pane.active{display:block;}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:inherit;transition:all .2s;z-index:2;}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
pre{padding:20px;overflow-x:auto;font-size:.82rem;line-height:1.7;color:#abb2bf;}

/* Syntax Colors */
.kw{color:#c678dd;}
.str{color:#98c379;}
.fn{color:#61afef;}
.num{color:#d19a66;}
.cm{color:#5c6370;font-style:italic;}
.op{color:#56b6c2;}
.tag{color:#e06c75;}
.attr{color:#d19a66;}
.val{color:#98c379;}
.key{color:#e06c75;}

/* ── PREVIEW SECTION ── */
.preview-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.preview-title{font-size:1rem;font-weight:700;}
.run-btn{background:var(--accent);color:#fff;border:none;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.88rem;transition:all .2s;display:flex;align-items:center;gap:8px;}
.run-btn:hover{background:color-mix(in srgb,var(--accent) 80%,#fff);}
.run-btn:active{transform:scale(.97);}
.sim-container{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:20px;min-height:120px;}
.sim-table{width:100%;border-collapse:collapse;font-size:.88rem;}
.sim-table th{background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent);padding:10px 14px;text-align:left;border:1px solid var(--border);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;}
.sim-table td{padding:9px 14px;border:1px solid var(--border);color:var(--text-muted);}
.sim-table tr:nth-child(even) td{background:var(--surface2);}
.sim-table tr:hover td{color:var(--text);}
.sim-output{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:var(--accent2);}
.sim-empty{color:var(--text-muted);font-size:.9rem;text-align:center;padding:30px;}
.sim-btn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.88rem;margin-bottom:14px;}

/* ── NAV ── */
.nav-bar{display:flex;gap:10px;margin-bottom:24px;}
.nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.88rem;transition:all .2s;}
.nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.nav-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── OVERVIEW ── */
.overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:24px;}
.ov-item{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:var(--surface);}
.ov-item:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);}
.ov-item.current{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 20%,transparent);}
.ov-item.solved{border-color:var(--correct);background:color-mix(in srgb,var(--correct) 15%,transparent);}
.ov-num{font-size:1rem;font-weight:800;}
.ov-label{font-size:.65rem;color:var(--text-muted);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
}

/* ── CODE EDITOR SECTION ── */
.editor-section{margin-top:20px;}
.editor-tabs{display:flex;gap:6px;margin-bottom:0;border-bottom:1px solid var(--border);}
.editor-tab{padding:8px 16px;border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-size:.82rem;font-weight:600;background:var(--surface2);color:var(--text-muted);transition:all .2s;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;}
.editor-tab:hover{color:var(--text);}
.editor-tab.active{background:var(--code-bg);color:var(--text);border-color:var(--border);}
.editor-pane{display:none;background:var(--code-bg);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;position:relative;}
.editor-pane.active{display:block;}
.code-editor{width:100%;min-height:220px;background:transparent;border:none;outline:none;color:#abb2bf;font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7;padding:20px;resize:vertical;box-sizing:border-box;tab-size:2;}
.code-editor::placeholder{color:#5c6370;}
.editor-toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);border-radius:0;}
.editor-file-label{font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);}
.editor-actions{display:flex;gap:8px;}
.btn-run{background:var(--accent2);color:#fff;border:none;padding:7px 18px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.82rem;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-run:hover{opacity:.85;transform:scale(.98);}
.btn-solution{background:var(--accent3);color:#1a1000;border:none;padding:7px 18px;border-radius:7px;cursor:pointer;font-family:inherit;font-weight:700;font-size:.82rem;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-solution:hover{opacity:.85;transform:scale(.98);}
.btn-clear{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);padding:7px 14px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .2s;}
.btn-clear:hover{border-color:var(--danger);color:var(--danger);}
.missing-hint{background:color-mix(in srgb,var(--accent3) 12%,transparent);border:1px dashed var(--accent3);border-radius:8px;padding:10px 14px;margin:10px 20px;font-size:.8rem;color:var(--accent3);font-family:'JetBrains Mono',monospace;}
.solution-revealed{border:1px solid var(--accent2);border-radius:8px;margin:8px;overflow:hidden;}
.solution-revealed pre{margin:0;padding:16px;font-size:.8rem;}
.run-result-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;margin-top:10px;font-size:.85rem;font-weight:600;}
.run-result-bar.success{background:color-mix(in srgb,var(--correct) 15%,transparent);color:var(--correct);border:1px solid color-mix(in srgb,var(--correct) 40%,transparent);}
.run-result-bar.info{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);}
</style>
</head>
<body>

<header>
  <div class="logo">FullStack <span>Exam</span> Portal</div>
  <div class="header-right">
    <div class="progress-badge">Solved: <span id="solvedCount">0</span>/30</div>
    <button class="theme-btn" onclick="toggleTheme()">☀ Light / 🌙 Dark</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Questions</div>
    <div class="q-list" id="qList"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">
    <div class="nav-bar">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← Previous</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next →</button>
    </div>
    <div id="questionArea"></div>
  </main>
</div>

span class=\"tag\">&lt;/script&gt;</span>", "json": "<span class=\"cm\">// Any student data</span>"}}, {"id": 30, "files": {"js": "<span class=\"kw\">const</span> express <span class=\"op\">=</span> <span class=\"fn\">require</span>(<span class=\"str\">'express'</span>);\n<span class=\"kw\">const</span> app <span class=\"op\">=</span> <span class=\"fn\">express</span>();\napp.<span class=\"fn\">use</span>(express.<span class=\"fn\">json</span>());\napp.<span class=\"fn\">use</span>(express.<span class=\"fn\">static</span>(<span class=\"str\">'.'</span>));\n<span class=\"kw\">let</span> students <span class=\"op\">=</span> <span class=\"fn\">require</span>(<span class=\"str\">'./data.json'</span>);\n\n<span class=\"cm\">// READ ALL</span>\napp.<span class=\"fn\">get</span>(<span class=\"str\">'/students'</span>, (req, res) <span class=\"op\">=></span> res.<span class=\"fn\">json</span>(students));\n\n<span class=\"cm\">// READ ONE</span>\napp.<span class=\"fn\">get</span>(<span class=\"str\">'/students/:id'</span>, (req, res) <span class=\"op\">=></span> {\n  <span class=\"kw\">const</span> s <span class=\"op\">=</span> students.<span class=\"fn\">find</span>(s <span class=\"op\">=></span> s.id <span class=\"op\">==</span> req.params.id);\n  s ? res.<span class=\"fn\">json</span>(s) : res.<span class=\"fn\">status</span>(<span class=\"num\">404</span>).<span class=\"fn\">json</span>({ message: <span class=\"str\">'Not found'</span> });\n});\n\n<span class=\"cm\">// CREATE</span>\napp.<span class=\"fn\">post</span>(<span class=\"str\">'/students'</span>, (req, res) <span class=\"op\">=></span> {\n  <span class=\"kw\">const</span> ns <span class=\"op\">=</span> { id: students.length <span class=\"op\">+</span> <span class=\"num\">1</span>, ...req.body };\n  students.<span class=\"fn\">push</span>(ns);\n  res.<span class=\"fn\">status</span>(<span class=\"num\">201</span>).<span class=\"fn\">json</span>(ns);\n});\n\n<span class=\"cm\">// UPDATE</span>\napp.<span class=\"fn\">put</span>(<span class=\"str\">'/students/:id'</span>, (req, res) <span class=\"op\">=></span> {\n  <span class=\"kw\">const</span> s <span class=\"op\">=</span> students.<span class=\"fn\">find</span>(s <span class=\"op\">=></span> s.id <span class=\"op\">==</span> req.params.id);\n  <span class=\"kw\">if</span> (!s) <span class=\"kw\">return</span> res.<span class=\"fn\">status</span>(<span class=\"num\">404</span>).<span class=\"fn\">json</span>({ message: <span class=\"str\">'Not found'</span> });\n  Object.<span class=\"fn\">assign</span>(s, req.body);\n  res.<span class=\"fn\">json</span>(s);\n});\n\n<span class=\"cm\">// DELETE</span>\napp.<span class=\"fn\">delete</span>(<span class=\"str\">'/students/:id'</span>, (req, res) <span class=\"op\">=></span> {\n  <span class=\"kw\">const</span> idx <span class=\"op\">=</span> students.<span class=\"fn\">findIndex</span>(s <span class=\"op\">=></span> s.id <span class=\"op\">==</span> req.params.id);\n  <span class=\"kw\">if</span> (idx <span class=\"op\">===</span> <span class=\"op\">-</span><span class=\"num\">1</span>) <span class=\"kw\">return</span> res.<span class=\"fn\">status</span>(<span class=\"num\">404</span>).<span class=\"fn\">json</span>({ message: <span class=\"str\">'Not found'</span> });\n  students.<span class=\"fn\">splice</span>(idx, <span class=\"num\">1</span>);\n  res.<span class=\"fn\">json</span>({ message: <span class=\"str\">'Deleted'</span> });\n});\n\napp.<span class=\"fn\">listen</span>(<span class=\"num\">3000</span>);", "html": "<span class=\"tag\">&lt;h2&gt;</span>Full CRUD Interface<span class=\"tag\">&lt;/h2&gt;</span>\n<span class=\"tag\">&lt;button</span> <span class=\"attr\">onclick</span><span class=\"op\">=</span><span class=\"val\">\"loadAll()\"</span><span class=\"tag\">&gt;</span>Show All<span class=\"tag\">&lt;/button&gt;</span>\n<span class=\"tag\">&lt;table</span> <span class=\"attr\">id</span><span class=\"op\">=</span><span class=\"val\">\"tbl\"</span><span class=\"tag\">&gt;</span>\n  <span class=\"tag\">&lt;thead&gt;&lt;tr&gt;&lt;th&gt;</span>ID<span class=\"tag\">&lt;/th&gt;&lt;th&gt;</span>Name<span class=\"tag\">&lt;/th&gt;&lt;th&gt;</span>Course<span class=\"tag\">&lt;/th&gt;&lt;th&gt;</span>Year<span class=\"tag\">&lt;/th&gt;&lt;th&gt;</span>Email<span class=\"tag\">&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;</span>\n  <span class=\"tag\">&lt;tbody&gt;&lt;/tbody&gt;</span>\n<span class=\"tag\">&lt;/table&gt;</span>\n<span class=\"tag\">&lt;script&gt;</span>\n  <span class=\"kw\">async function</span> <span class=\"fn\">loadAll</span>() {\n    <span class=\"kw\">const</span> data <span class=\"op\">=</span> <span class=\"kw\">await</span> (<span class=\"kw\">await</span> <span class=\"fn\">fetch</span>(<span class=\"str\">'/students'</span>)).<span class=\"fn\">json</span>();\n    <span class=\"kw\">const</span> tb <span class=\"op\">=</span> document.<span class=\"fn\">querySelector</span>(<span class=\"str\">'#tbl tbody'</span>);\n    tb.innerHTML <span class=\"op\">=</span> data.<span class=\"fn\">map</span>(s <span class=\"op\">=></span>\n      <span class=\"str\">\\`&lt;tr&gt;&lt;td&gt;\\${s.id}&lt;/td&gt;&lt;td&gt;\\${s.name}&lt;/td&gt;&lt;td&gt;\\${s.course}&lt;/td&gt;&lt;td&gt;\\${s.year}&lt;/td&gt;&lt;td&gt;\\${s.email}&lt;/td&gt;&lt;/tr&gt;\\`</span>\n    ).<span class=\"fn\">join</span>(<span class=\"str\">''</span>);\n  }\n<span class=\"tag\">&lt;/script&gt;</span>", "json": "[\n  { <span class=\"key\">\"id\"</span>:<span class=\"num\">1</span>, <span class=\"key\">\"name\"</span>:<span class=\"str\">\"Aarav Sharma\"</span>, <span class=\"key\">\"course\"</span>:<span class=\"str\">\"B.Tech CSE\"</span>, <span class=\"key\">\"year\"</span>:<span class=\"num\">2</span>, <span class=\"key\">\"email\"</span>:<span class=\"str\">\"aarav@example.com\"</span> },\n  { <span class=\"key\">\"id\"</span>:<span class=\"num\">2</span>, <span class=\"key\">\"name\"</span>:<span class=\"str\">\"Priya Verma\"</span>, <span class=\"key\">\"course\"</span>:<span class=\"str\">\"B.Tech IT\"</span>, <span class=\"key\">\"year\"</span>:<span class=\"num\">3</span>, <span class=\"key\">\"email\"</span>:<span class=\"str\">\"priya@example.com\"</span> },\n  { <span class=\"key\">\"id\"</span>:<span class=\"num\">3</span>, <span class=\"key\">\"name\"</span>:<span class=\"str\">\"Rohan Mehta\"</span>, <span class=\"key\">\"course\"</span>:<span class=\"str\">\"BCA\"</span>, <span class=\"key\">\"year\"</span>:<span class=\"num\">1</span>, <span class=\"key\">\"email\"</span>:<span class=\"str\">\"rohan@example.com\"</span> },\n  { <span class=\"key\">\"id\"</span>:<span class=\"num\">4</span>, <span class=\"key\">\"name\"</span>:<span class=\"str\">\"Sneha Gupta\"</span>, <span class=\"key\">\"course\"</span>:<span class=\"str\">\"MCA\"</span>, <span class=\"key\">\"year\"</span>:<span class=\"num\">2</span>, <span class=\"key\">\"email\"</span>:<span class=\"str\">\"sneha@example.com\"</span> },\n  { <span class=\"key\">\"id\"</span>:<span class=\"num\">5</span>, <span class=\"key\">\"name\"</span>:<span class=\"str\">\"Aditya Singh\"</span>, <span class=\"key\">\"course\"</span>:<span class=\"str\">\"B.Tech CSE\"</span>, <span class=\"key\">\"year\"</span>:<span class=\"num\">4</span>, <span class=\"key\">\"email\"</span>:<span class=\"str\">\"aditya@example.com\"</span> }\n]"}}]

function stripHtml(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

// ══════════════════════════════════════════════════════════
//  GET STARTER CODE — skeleton like GLA exam portal
// ══════════════════════════════════════════════════════════
function getStarterCode(qId, fileType) {
  var q = questions.find(function(x){ return x.id === qId; });
  if (!q) return '';
  var rawJs   = stripHtml(q.files.js   || '');
  var rawHtml = stripHtml(q.files.html || '');
  var rawJson = stripHtml(q.files.json || '');

  if (fileType === 'json') return rawJson.trim();

  if (fileType === 'js') {
    var varM    = rawJs.match(/(?:const|let)\s+(\w+)\s*=\s*require\s*\(\s*['"]\.\/data\.json['"]\s*\)/);
    var dataVar = varM ? varM[1] : 'data';
    var rM      = rawJs.match(/app\.(get|post|put|delete|patch)\s*\(\s*['"]([^'"]+)['"]/);
    var method  = rM ? rM[1] : 'get';
    var endpoint = rM ? rM[2] : '/endpoint';
    var routeLines = rawJs.split('\n').filter(function(l){
      return /app\.(get|post|put|delete|patch)\s*\(/.test(l) && l.indexOf('=>') !== -1;
    });
    var out = [];
    out.push("const express = require('express');");
    out.push('const app = express();');
    out.push('const PORT = 3000;');
    out.push('');
    out.push('// Middleware — do not remove');
    out.push('app.use(express.json());');
    out.push("app.use(express.static('.'));");
    out.push('');
    out.push('const ' + dataVar + " = require('./data.json');");
    out.push('');
    out.push('// ─────────────────────────────────────────');
    out.push('// Write your API routes below this line');
    out.push('// ─────────────────────────────────────────');
    out.push('');
    if (routeLines.length > 0) {
      routeLines.forEach(function(rl) {
        var sig = rl.trim().replace(/\{.*$/, '{').trim();
        out.push(sig.endsWith('{') ? sig : sig + ' {');
        out.push('  // TODO: Write your route logic here');
        out.push('});');
        out.push('');
      });
    } else {
      out.push("// app." + method + "('" + endpoint + "', (req, res) => {");
      out.push('//   // Write your logic here');
      out.push('// });');
      out.push('');
    }
    out.push('// ─────────────────────────────────────────');
    out.push('');
    out.push('app.listen(PORT, () => {');
    out.push("  console.log('Server running on http://localhost:' + PORT);");
    out.push('});');
    return out.join('\n');
  }

  if (fileType === 'html') {
    var title = q.title || 'Exam';
    var fM    = rawHtml.match(/fetch\s*\(\s*['"`]([^'"`\n]+)['"`]/);
    var ep    = fM ? fM[1].split('?')[0] : '/endpoint';
    var lines = [];
    lines.push('<!DOCTYPE html>');
    lines.push('<html lang="en">');
    lines.push('<head>');
    lines.push('  <meta charset="UTF-8"/>');
    lines.push('  <title>' + title + '<\/title>');
    lines.push('  <style>');
    lines.push('    body  { font-family: Arial; padding: 20px; }');
    lines.push('    table { border-collapse: collapse; width: 100%; }');
    lines.push('    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }');
    lines.push('    th    { background: #f0f0f0; }');
    lines.push('    button { padding: 8px 16px; cursor: pointer; margin-bottom: 12px; }');
    lines.push('  <\/style>');
    lines.push('<\/head>');
    lines.push('<body>');
    lines.push('');
    lines.push('  <h1>' + title + '<\/h1>');
    lines.push('');
    lines.push('  <!-- TODO: Add your HTML elements here (button, table, inputs, etc.) -->');
    lines.push('');
    lines.push('  <script>');
    lines.push("    // TODO: Write your fetch('" + ep + "') logic here");
    lines.push('    // Example:');
    lines.push('    // async function loadData() {');
    lines.push("    //   const res  = await fetch('" + ep + "');");
    lines.push('    //   const data = await res.json();');
    lines.push('    //   // render data to the page');
    lines.push('    // }');
    lines.push('  <\/script>');
    lines.push('<\/body>');
    lines.push('<\/html>');
    return lines.join('\n');
  }
  return '';
}

// ══════════════════════════════════════════════════════════
//  RUN CODE — validate then simulate
// ══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════
//  VALIDATE ALL 3 FILES AND RETURN ERROR LIST
// ══════════════════════════════════════════════════════════
function validateAllFiles(qId) {
  var errors = [];

  var jsCode   = (document.getElementById('editor-js-'   + qId) || {}).value || '';
  var htmlCode = (document.getElementById('editor-html-' + qId) || {}).value || '';
  var jsonCode = (document.getElementById('editor-json-' + qId) || {}).value || '';

  // ── index.js checks ──────────────────────────────────────
  var jsStripped = jsCode.replace(/\/\/[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '').trim();

  if (jsStripped.length < 20) {
    errors.push({ file: 'index.js', msg: 'File is empty — write your Express route code here.' });
  } else {
    // Strip all comments so commented-out code does not pass checks
    var jsNoComments = jsCode
      .replace(/\/\/[^\n]*/g, '')
      .replace(/\/\*[\s\S]*?\*\//g, '')
      .trim();

    var hasRoute = /app\.(get|post|put|delete|patch)\s*\(\s*['"`][^'"`]+['"`]\s*,\s*(function|\(req|\(req,\s*res\)|async)/.test(jsNoComments);
    if (!hasRoute) {
      errors.push({ file: 'index.js', msg: 'No valid Express route found. Write: app.get(\'/path\', (req, res) => { ... });' });
    }
    var hasRes = /res\.(json|send|status)\s*\(/.test(jsNoComments);
    if (hasRoute && !hasRes) {
      errors.push({ file: 'index.js', msg: 'Response missing inside route — add res.json(...) or res.send(...) inside your route handler.' });
    }
    // Check mismatched braces only in the user-written route section
    // Extract only the part after "Write your API routes below this line"
    var routeSection = jsCode;
    var markerIdx = jsCode.indexOf('Write your API routes below this line');
    if (markerIdx !== -1) {
      routeSection = jsCode.substring(markerIdx);
    }
    // Remove app.listen(...) block from check to avoid false positives
    var checkSection = routeSection.replace(/app\.listen[\s\S]*$/, '').replace(/\/\/[^\n]*/g, '').trim();

    var openB  = (checkSection.match(/\{/g) || []).length;
    var closeB = (checkSection.match(/\}/g) || []).length;
    if (openB !== closeB) {
      errors.push({ file: 'index.js', msg: 'Mismatched curly braces { } in your route — ' + openB + ' opening vs ' + closeB + ' closing. Check your brackets.' });
    }
    var openP  = (checkSection.match(/\(/g) || []).length;
    var closeP = (checkSection.match(/\)/g) || []).length;
    if (openP !== closeP) {
      errors.push({ file: 'index.js', msg: 'Mismatched parentheses ( ) in your route — ' + openP + ' opening vs ' + closeP + ' closing. Check your syntax.' });
    }
  }

  // ── index.html checks ────────────────────────────────────
  // Strip HTML comments AND JS single-line comments to check real code only
  var htmlNoComments = htmlCode
    .replace(/<!--[\s\S]*?-->/g, '')       // remove HTML comments
    .replace(/\/\/[^\n]*/g, '')             // remove JS // comments
    .replace(/\/\*[\s\S]*?\*\//g, '')       // remove JS /* */ comments
    .trim();

  if (htmlNoComments.length < 30) {
    errors.push({ file: 'index.html', msg: 'File is empty — write your HTML elements and fetch() code here.' });
  } else {
    // Check fetch() only in uncommented code
    var hasFetch = /fetch\s*\(/.test(htmlNoComments);
    if (!hasFetch) {
      errors.push({ file: 'index.html', msg: 'No fetch() call found — you need fetch(\'/endpoint\') to call your API.' });
    }
    // Check for actual function definition (not just commented example)
    var hasRealFunction = /(async\s+function|function\s+\w+)\s*\(/.test(htmlNoComments);
    if (!hasRealFunction) {
      errors.push({ file: 'index.html', msg: 'No JavaScript function found — write an actual function (e.g. async function getStudents() { ... }).' });
    }
    var hasScriptTag = /<script[\s>]/.test(htmlCode);
    if (!hasScriptTag) {
      errors.push({ file: 'index.html', msg: 'No <script> tag found — write your JavaScript inside a <script> block.' });
    }
    // Unclosed common tags check
    ['<script', '<body', '<head'].forEach(function(tag) {
      var closeTag = tag.replace('<', '</');
      if (htmlCode.indexOf(tag) !== -1 && htmlCode.indexOf(closeTag) === -1) {
        errors.push({ file: 'index.html', msg: tag + '> tag is open but ' + closeTag + '> closing tag is missing.' });
      }
    });
  }

  // ── data.json checks ─────────────────────────────────────
  var jsonTrimmed = jsonCode.trim();

  if (jsonTrimmed.length > 5 && jsonTrimmed !== '// data.json content goes here...') {
    // Remove JS-style comments before parsing (common mistake)
    var cleanJson = jsonTrimmed.replace(/\/\/[^\n]*/g, '').trim();
    try {
      var parsed = JSON.parse(cleanJson);
      if (!Array.isArray(parsed) && typeof parsed !== 'object') {
        errors.push({ file: 'data.json', msg: 'Invalid JSON — must be an array [ ] or object { }.' });
      }
    } catch(e) {
      // Try to give a helpful line hint
      var msg = e.message || 'Invalid JSON';
      errors.push({ file: 'data.json', msg: 'JSON parse error: ' + msg + ' — check your quotes, commas, and brackets.' });
    }
  }

  return errors;
}

function runUserCode(qId) {
  var q = questions.find(function(x){ return x.id === qId; });
  if (!q) return;
  var bar = document.getElementById('run-bar-' + qId);

  var errors = validateAllFiles(qId);

  if (errors.length > 0) {
    // Build error display grouped by file with colored file badges
    var fileColors = { 'index.js': '#f7df1e', 'index.html': '#e34c26', 'data.json': '#5b9bd5' };
    var html = '<div style="width:100%">';
    html += '<b style="font-size:.9rem">❌ ' + errors.length + ' error(s) found — fix them and click Run again:</b>';
    html += '<div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">';
    errors.forEach(function(err) {
      var col = fileColors[err.file] || '#aaa';
      html += '<div style="display:flex;align-items:flex-start;gap:8px;">'
            + '<span style="background:' + col + ';color:#111;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:700;white-space:nowrap;flex-shrink:0;">' + err.file + '</span>'
            + '<span style="color:var(--text);font-size:.83rem">' + err.msg + '</span>'
            + '</div>';
    });
    html += '</div></div>';
    if (bar) {
      bar.className = 'run-result-bar';
      bar.style.background = 'color-mix(in srgb,var(--danger) 12%,transparent)';
      bar.style.border = '1px solid color-mix(in srgb,var(--danger) 40%,transparent)';
      bar.style.color = 'var(--text)';
      bar.style.flexDirection = 'column';
      bar.style.alignItems = 'flex-start';
      bar.innerHTML = html;
      bar.style.display = 'flex';
    }
    return;
  }

  // All 3 files passed — run simulation
  if (bar) {
    bar.className = 'run-result-bar success';
    bar.style.flexDirection = '';
    bar.style.alignItems = '';
    bar.style.background = '';
    bar.style.border = '';
    bar.style.color = '';
    bar.innerHTML = '✓ All 3 files look good! Code executed → Data rendered below ↓';
    bar.style.display = 'flex';
  }
  solved.add(currentQ);
  renderSidebar();
  document.getElementById('solvedCount').textContent = solved.size;
  runSimulation(qId);
}
function switchEditorTab(tabEl, paneId) {
  const tabs = tabEl.parentElement.querySelectorAll('.editor-tab');
  tabs.forEach(t => t.classList.remove('active'));

  const pane = document.getElementById(paneId);
  if (!pane) return;
  pane.parentElement.querySelectorAll('.editor-pane').forEach(p => p.classList.remove('active'));
  pane.classList.add('active');
}

//  SIMULATION ENGINE

function getUserJsonData(qId, dataKey) {
  // Try to parse user's data.json editor content first
  const jsonEl = document.getElementById('editor-json-' + qId);
  if (jsonEl && jsonEl.value.trim()) {
    try {
      const parsed = JSON.parse(jsonEl.value.trim());
      // Accept array directly, or object with matching key
      if (Array.isArray(parsed)) return parsed;
      if (parsed[dataKey]) return parsed[dataKey];
    } catch(e) {
      // If JSON is invalid, show error in container
      return null;
    }
  }
  // Fallback to built-in sampleData
  return sampleData[dataKey] || [];
}

function runSimulation(qId) {
  const q = questions.find(x => x.id === qId);
  const sim = q.simulate;
  const container = document.getElementById(`sim-${qId}`);

  solved.add(currentQ);
  renderSidebar();
  document.getElementById('solvedCount').textContent = solved.size;

  if (sim.type === 'table') {
    const data = getUserJsonData(qId, sim.dataKey);
    if (data === null) {
      container.innerHTML = `<div style="padding:16px;color:var(--danger)">⚠ data.json mein invalid JSON hai! Please fix it and run again.</div>`;
      return;
    }
    const headers = sim.cols.map(c => `<th>${c}</th>`).join('');
    const rows = data.map(row => {
      const vals = Object.values(row);
      return '<tr>' + vals.map(v => `<td>${v}</td>`).join('') + '</tr>';
    }).join('');
    container.innerHTML = `
      <table class="sim-table">
        <thead><tr>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } else if (sim.type === 'count') {
    // For count, compute from user's data if available
    const data = getUserJsonData(qId, sim.dataKey);
    const countVal = (data && data !== null) ? data.length : sim.value;
    container.innerHTML = `
      <div style="text-align:center;padding:24px;">
        <div style="font-size:2.5rem;font-weight:800;color:var(--accent2)">${countVal}</div>
        <div style="color:var(--text-muted);margin-top:6px">${sim.label}</div>
      </div>
    `;
  } else if (sim.type === 'list') {
    const items = sim.data.map(d => `<li style="padding:6px 0;border-bottom:1px solid var(--border)">${d}</li>`).join('');
    container.innerHTML = `<ul style="list-style:none;padding:8px">${items}</ul>`;
  } else if (sim.type === 'output') {
    const lines = sim.lines.map(l => `<div class="sim-output">→ ${l}</div>`).join('');
    container.innerHTML = `<div style="padding:8px">${lines}</div>`;
  } else if (sim.type === 'single') {
    const data = getUserJsonData(qId, sim.dataKey);
    const row = (data && data !== null) ? data[0] : (sampleData[sim.dataKey] || [])[0];
    if (row) {
      container.innerHTML = `
        <div style="padding:12px">
          ${Object.entries(row).map(([k,v]) => `
            <div style="display:flex;gap:16px;padding:8px;border-bottom:1px solid var(--border)">
              <span style="color:var(--accent);width:80px;font-weight:700">${k}</span>
              <span>${v}</span>
            </div>
          `).join('')}
        </div>
      `;
    }
  } else if (sim.type === 'form') {
    const data = getUserJsonData(qId, 'students');
    const newId = (data && data !== null && data.length > 0) ? data.length + 1 : 6;
    container.innerHTML = `
      <div style="padding:12px;color:var(--accent2)">
        ✓ POST /students → 201 Created<br>
        <pre style="margin-top:8px;color:var(--text)">${JSON.stringify({id:newId,name:"New Student",course:"B.Tech CSE",year:1,email:"new@example.com"},null,2)}</pre>
      </div>
    `;
  }
}

// ══════════════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════════════
function switchTab(tabEl, paneId) {
  const tabs = tabEl.parentElement.querySelectorAll('.code-tab');
  tabs.forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');

  const pane = document.getElementById(paneId);
  if (!pane) return;
  const allPanes = pane.parentElement.querySelectorAll('.code-pane');
  allPanes.forEach(p => p.classList.remove('active'));
  pane.classList.add('active');
}

// ══════════════════════════════════════════════════════════
//  COPY CODE
// ══════════════════════════════════════════════════════════
function copyCode(paneId) {
  const pre = document.getElementById(paneId).querySelector('pre');
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(paneId).querySelector('.copy-btn');
    btn.textContent = '✓ Copied!';
    btn.style.background = 'var(--accent2)';
    btn.style.color = '#fff';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = ''; btn.style.color = ''; }, 1500);
  });
}

// ══════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════
function navigate(dir) {
  currentQ = Math.max(0, Math.min(questions.length - 1, currentQ + dir));
  renderSidebar();
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goToQ(i) {
  currentQ = i;
  renderSidebar();
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════════════════
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
}

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
renderSidebar();
renderQuestion();
</script>
